<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            background-color: #FFFF00;
            width: 200px;
            height: 60px;
            padding: 10px;
            border: 20px solid lightgray;

        }
        #round { border-image: url("그림2.png")
        30 round;}
        #repeat { border-image: url("그림2.png")
        30 repeat;}
        #stretch { border-image: url("그림2.png")
        30 stretch;}
    </style>
</head>
<body>

<p>20x20 크기의 회색 테두리를 가진 P 태그</p>
<p id = "round">round 스타일</p>
<p id = "repeat">repeat 스타일</p>
<p id = "stretch">stretch 스타일</p>
</body>
</html>
